version: 2

models:
  - name: stg_orders
    description: "Cleaned and typed orders from the raw seed"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'returned']
      - name: amount
        tests:
          - not_null

  - name: fct_customer_summary
    description: "One row per customer with revenue and return stats"
    columns:
      - name: customer_name
        tests:
          - unique
          - not_null
